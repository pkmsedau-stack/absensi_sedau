<svg viewBox="0 0 500 580" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Hexagon Border -->
  <polygon points="250,20 480,150 480,430 250,560 20,430 20,150" stroke="#004d26" stroke-width="24" stroke-linejoin="round" fill="#ffffff" />

  <!-- The Greek Cross (Main Body) -->
  <g id="puskesmas-cross">
    <!-- Horizontal and vertical combined, except bottom-right cut -->
    <!-- Center is 250, 290 -->
    <!-- Upper vertical arm -->
    <rect x="200" y="130" width="100" height="160" fill="#004d26" />
    <!-- Left horizontal arm -->
    <rect x="100" y="240" width="150" height="100" fill="#004d26" />
    <!-- Bottom vertical arm -->
    <rect x="200" y="290" width="100" height="160" fill="#004d26" />
    <!-- Right horizontal arm (excluding house cutout) -->
    <rect x="250" y="240" width="150" height="100" fill="#004d26" />

    <!-- Slanted house roof structure covering bottom-right -->
    <!-- Roof outline (white gap) -->
    <!-- Let's cover with a custom polygon of the house shape nested/stacked -->
    <!-- The roof starts from the center bottom vertical of the cross, slanting up to the right arm -->
    <!-- Let's draw the green house shape on top with `#007330` green (representing the dual green hues in Puskesmas logo) -->
    <polygon points="175,340 310,240 420,320 420,340 310,240 175,340" fill="#ffffff" stroke="#ffffff" stroke-width="4" />
    
    <!-- Dynamic visual separation of the house representation -->
    <polygon points="180,340 310,240 420,320 420,340 310,440 200,440" fill="#006622" opacity="0.1" />
    
    <!-- Beautiful vivid green house cutout base matching the official Puskesmas insignia -->
    <path d="M 185 340 L 310 240 L 415 320" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />
    <polygon points="185,345 310,245 410,325 410,440 210,440" fill="#00661a" />
    
    <!-- White Interlocking Partner Rings (Rantai Pengikat/Logo Kesehatan) -->
    <circle cx="285" cy="315" r="24" stroke="#ffffff" stroke-width="6" fill="none" />
    <circle cx="315" cy="315" r="24" stroke="#ffffff" stroke-width="6" fill="none" />
    <!-- Small interlacing correction for realism -->
    <path d="M 299 293 A 24 24 0 0 1 309 315" stroke="#ffffff" stroke-width="6" fill="none" />
  </g>
</svg>
